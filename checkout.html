<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Secure Checkout - الروابي شاليهات</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}body{margin:0;background:#f5f6f8;min-height:100vh}.checkout-wrapper{display:flex;min-height:100vh;flex-direction:column}.checkout-left{width:100%;background:#f1f2f4;padding:25px 20px;display:flex;flex-direction:column;justify-content:space-between;order:2}.brand-name{font-size:16px;font-weight:700;margin-bottom:20px;text-align:center}.total-label{color:#555;font-size:14px;text-align:center;margin-bottom:5px}.total-amount{font-size:36px;font-weight:bold;text-align:center;margin:0 0 15px 0}.footer-left{font-size:13px;color:#777;text-align:center;padding-top:15px;border-top:1px solid #ddd}.checkout-right{width:100%;background:#fff;padding:25px 20px;order:1;flex:1}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.header h2{margin:0;font-size:22px}.lang{border:1px solid #ddd;padding:6px 10px;border-radius:6px;font-size:14px;background:#fff}.order-summary{background:#f8f9fa;border-radius:12px;padding:20px;margin:20px 0;border:1px solid #e9ecef}.order-summary h4{margin:0 0 15px 0;color:#2d3748;font-size:16px;font-weight:600}.order-detail{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;color:#4a5568;padding:5px 0}.order-detail.total{margin-top:15px;padding-top:15px;border-top:2px solid #e2e8f0;font-weight:700;color:#1a202c;font-size:18px}.section{margin-top:25px}.section label{display:block;font-size:14px;margin-bottom:8px;font-weight:500;color:#333}.input{width:100%;padding:14px;border:1px solid #ddd;border-radius:8px;font-size:15px;transition:border-color .3s;background:#fff}.input:focus{outline:none;border-color:#4f6cff;box-shadow:0 0 0 2px rgba(79,108,255,.1)}.row{display:flex;gap:10px;flex-wrap:wrap}.row .input{flex:1;min-width:120px}.card-box{border:2px solid #4f6cff;padding:15px;border-radius:8px;display:flex;align-items:center;gap:10px;color:#4f6cff;font-weight:500;background:#fff;margin-top:10px}.pay-btn{width:100%;padding:16px;border:none;border-radius:10px;background:#4f6cff;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:25px}.secure{margin-top:14px;font-size:13px;color:#64748b;text-align:center}.success-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}.success-box{max-width:420px;width:100%;background:#fff;border-radius:18px;padding:28px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.08)}.success-box h2{margin:0 0 12px;font-size:26px}.success-box p{margin:6px 0;color:#64748b;line-height:1.7}@media(min-width:980px){.checkout-wrapper{flex-direction:row}.checkout-left,.checkout-right{width:50%;order:unset;padding:40px}}
</style>
</head>
<body>
<div class="checkout-wrapper" id="checkoutPage">
  <div class="checkout-left">
    <div>
      <div class="brand-name">الروابي شاليهات</div>
      <div class="total-label" id="planText">إجمالي الحجز</div>
      <div class="total-amount" id="payAmount">520.00 ر.س</div>
    </div>
    <div class="footer-left" id="footerText">بعد نجاح العملية سيتم الرجوع تلقائيًا إلى واتساب لإرسال تفاصيل الحجز</div>
  </div>
  <div class="checkout-right">
    <div class="header"><h2>Secure Checkout</h2><div class="lang">AR</div></div>
    <div class="order-summary">
      <h4>تفاصيل الطلب</h4>
      <div class="order-detail"><span>الخدمة</span><span>حجز شاليه</span></div>
      <div class="order-detail"><span>نوع السداد</span><span id="summaryPlan">دفع كامل</span></div>
      <div class="order-detail total"><span>الإجمالي</span><span id="summaryAmount">520.00 ر.س</span></div>
    </div>
    <div class="section"><label>البطاقة</label><div class="card-box">💳 بطاقة محفوظة</div></div>
    <div class="section"><label>اسم حامل البطاقة</label><input class="input" type="text" value="RAWABI DEMO" readonly></div>
    <div class="section"><label>رقم البطاقة</label><input class="input" type="text" value="4242 4242 4242 4242" readonly></div>
    <div class="section"><div class="row"><div style="flex:1"><label>MM/YY</label><input class="input" type="text" value="12/28" readonly></div><div style="flex:1"><label>CVC</label><input class="input" type="text" value="123" readonly></div></div></div>
    <button class="pay-btn" id="payBtn">ادفع الآن</button>
    <div class="secure">🔒 Secure payment</div>
  </div>
</div>
<div class="success-screen" id="successScreen"><div class="success-box"><h2>تم الدفع بنجاح</h2><p id="successText">تم تسجيل العملية بنجاح.</p><p>جاري الرجوع إلى واتساب...</p></div></div>
<script>
const params=new URLSearchParams(window.location.search);const total=params.get('total')||'520.00';const plan=params.get('plan')||'full';const remaining=params.get('remaining')||'0.00';document.getElementById('payAmount').textContent=`${total} ر.س`;document.getElementById('summaryAmount').textContent=`${total} ر.س`;document.getElementById('summaryPlan').textContent=plan==='deposit'?'دفع عربون':'دفع كامل';if(plan==='deposit'){document.getElementById('planText').textContent='قيمة العربون';document.getElementById('footerText').textContent=`المتبقي بعد العربون: ${remaining} ر.س`;document.getElementById('successText').textContent=`تم دفع العربون بنجاح. المتبقي: ${remaining} ر.س`;}document.getElementById('payBtn').addEventListener('click',function(){document.getElementById('checkoutPage').style.display='none';document.getElementById('successScreen').style.display='flex';setTimeout(()=>{window.location.href=`index.html?payment=success&source=checkout&plan=${encodeURIComponent(plan)}&total=${encodeURIComponent(total)}&remaining=${encodeURIComponent(remaining)}`},1600)});
</script>
</body>
</html>
