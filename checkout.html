<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout - شاليهات الروابي</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}body{margin:0;background:#f5f6f8;min-height:100vh}.checkout-wrapper{display:flex;min-height:100vh;flex-direction:column}.checkout-left{width:100%;background:#f1f2f4;padding:28px 20px;display:flex;flex-direction:column;justify-content:center;order:2}.brand-name{font-size:16px;font-weight:700;margin-bottom:14px;text-align:center}.total-label{color:#555;font-size:14px;text-align:center;margin-bottom:6px}.total-amount{font-size:38px;font-weight:900;text-align:center;margin:0 0 20px}.checkout-right{width:100%;background:#fff;padding:28px 20px;order:1}.order-summary{background:#fafafa;border:1px solid #eee;border-radius:18px;padding:18px;margin-bottom:22px}.order-summary h4{margin:0 0 10px;font-size:18px}.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:#555;font-size:14px}.row:last-child{margin-bottom:0}.field{margin-bottom:14px}.field label{display:block;font-size:13px;color:#666;margin-bottom:7px}.field input{width:100%;padding:14px 16px;border:1px solid #ddd;border-radius:14px;font-size:15px;outline:none}.pay-btn{width:100%;border:none;border-radius:14px;padding:16px 18px;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(180deg,#111827,#374151);color:#fff}.secure{text-align:center;color:#6b7280;font-size:12px;margin-top:12px}.success{display:none;text-align:center;padding:60px 20px}.success-icon{width:78px;height:78px;border-radius:50%;background:#16a34a;color:#fff;display:grid;place-items:center;font-size:36px;margin:0 auto 18px}@media(min-width:900px){.checkout-wrapper{flex-direction:row}.checkout-left,.checkout-right{width:50%;order:initial;padding:40px}.checkout-left{justify-content:space-between}.total-amount{text-align:right}.brand-name,.total-label{text-align:right}}
</style>
</head>
<body>
<div class="checkout-wrapper" id="checkoutPage">
  <div class="checkout-left">
    <div>
      <div class="brand-name">شاليهات الروابي</div>
      <div class="total-label">إجمالي الحجز</div>
      <div class="total-amount" id="payAmount">﷼ 0.00</div>
    </div>
    <div class="secure">🔒 Secure payment</div>
  </div>
  <div class="checkout-right">
    <div class="order-summary">
      <h4>Secure Checkout</h4>
      <div class="row"><span>الحالة</span><span>جاهز للدفع</span></div>
      <div class="row"><span>النوع</span><span>حجز شاليه</span></div>
      <div class="row"><span>المبلغ</span><span id="summaryAmount">﷼ 0.00</span></div>
    </div>
    <div class="field"><label>اسم حامل البطاقة</label><input value="RAWABI DEMO" readonly></div>
    <div class="field"><label>رقم البطاقة</label><input value="4242 4242 4242 4242" readonly></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="field"><label>MM/YY</label><input value="12/28" readonly></div><div class="field"><label>CVC</label><input value="123" readonly></div></div>
    <button id="payBtn" class="pay-btn" onclick="processPayment()">Pay ﷼ 0.00</button>
    <div class="secure">بعد نجاح العملية سيتم الرجوع تلقائيًا إلى واتساب</div>
  </div>
</div>
<div class="success" id="successPage"><div class="success-icon">✓</div><h2>تم الدفع بنجاح</h2><p>Your payment has been completed successfully.</p><p class="secure">جاري العودة إلى واتساب...</p></div>
<script>
const params=new URLSearchParams(window.location.search);const total=params.get('total')||'0.00';document.getElementById('payAmount').textContent=`﷼ ${total}`;document.getElementById('summaryAmount').textContent=`﷼ ${total}`;document.getElementById('payBtn').textContent=`Pay ﷼ ${total}`;
function processPayment(){const btn=document.getElementById('payBtn');btn.innerText='Processing payment...';btn.disabled=true;setTimeout(()=>{document.getElementById('checkoutPage').style.display='none';document.getElementById('successPage').style.display='block';setTimeout(()=>{window.location.href='index.html?payment=success&source=checkout'},1400)},1200)}
</script>
</body>
</html>
