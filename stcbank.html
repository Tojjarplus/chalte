<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>STC Bank - شاليهات الروابي</title>
<style>
:root{--stc-green:linear-gradient(135deg,#1fd18b,#7ae582);--stc-green-solid:#1fd18b;--border:#e5e7eb;--text:#374151;--shadow:0 10px 30px rgba(0,0,0,.08);--radius:16px}*{box-sizing:border-box}body{margin:0;background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.container{width:100%;max-width:420px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:relative}.header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;background:var(--stc-green);color:#08351f;font-weight:800}.section{padding:20px}.amount{font-size:36px;font-weight:900;color:#111827;text-align:center;margin:10px 0 6px}.muted{text-align:center;color:#6b7280;font-size:14px}.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:16px}.otp{display:none}.label{font-size:13px;color:#6b7280;margin-bottom:8px;display:block}.input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:14px;font-size:16px;outline:none}button{width:100%;border:none;border-radius:14px;padding:15px 16px;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px;background:var(--stc-green);color:#08351f}.success{display:none;text-align:center;padding:40px 20px}.success .icon{width:72px;height:72px;border-radius:50%;background:var(--stc-green);display:grid;place-items:center;margin:0 auto 18px;font-size:34px;color:#08351f}.small{font-size:12px;color:#6b7280;line-height:1.8;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <div class="header"><span>STC Bank</span><span>شاليهات الروابي</span></div>
  <div class="section" id="page1">
    <div class="muted">المبلغ المطلوب</div>
    <div class="amount" id="amount">﷼ 0.00</div>
    <div class="muted">بعد نجاح العملية سيتم الرجوع إلى واتساب</div>
    <div class="card">
      <label class="label">رقم الحساب</label>
      <input class="input" value="SA00 0000 0000 0000 0000 0000" readonly>
      <button onclick="sendToBank()">متابعة الدفع</button>
    </div>
  </div>
  <div class="section otp" id="page2">
    <div class="muted">أدخل رمز التحقق</div>
    <div class="card">
      <label class="label">OTP</label>
      <input class="input" value="1234" readonly>
      <button onclick="confirmOtp()">تأكيد</button>
    </div>
  </div>
  <div class="success" id="successPage">
    <div class="icon">✓</div>
    <h2>تم الدفع بنجاح</h2>
    <p class="muted">جاري الرجوع إلى واتساب...</p>
  </div>
</div>
<script>
const params=new URLSearchParams(window.location.search);const total=params.get('total')||'0.00';document.getElementById('amount').textContent=`﷼ ${total}`;
function sendToBank(){document.getElementById('page1').style.display='none';document.getElementById('page2').style.display='block'}
function confirmOtp(){document.getElementById('page2').style.display='none';document.getElementById('successPage').style.display='block';setTimeout(()=>{window.location.href='index.html?payment=success&source=stcbank'},1400)}
</script>
</body>
</html>
